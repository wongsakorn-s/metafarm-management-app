services:
  db:
    image: postgres:15-alpine
    container_name: metafarm_db
    restart: always
    env_file:
      - ./deploy/prod/.env.production
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - metafarm_network
    secrets:
      - postgres_password

  backend:
    build: ./backend
    container_name: metafarm_backend
    restart: always
    env_file:
      - ./deploy/prod/.env.production
    environment:
      APP_ENV: production
      DATABASE_URL: ""
      DB_PASSWORD: ""
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      ADMIN_PASSWORD: ""
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      JWT_SECRET_KEY: ""
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      OPENWEATHER_API_KEY: ""
      OPENWEATHER_API_KEY_FILE: /run/secrets/openweather_api_key
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-true}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
    volumes:
      - ./backend/static:/app/static
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/ready')"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metafarm_network
    secrets:
      - postgres_password
      - admin_password
      - jwt_secret_key
      - openweather_api_key

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: metafarm_frontend
    restart: always
    env_file:
      - ./deploy/prod/.env.production
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metafarm_network

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: metafarm_reverse_proxy
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/prod/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/prod/certs:/etc/nginx/certs:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/healthz"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - metafarm_network

volumes:
  postgres_data:

networks:
  metafarm_network:
    driver: bridge

secrets:
  postgres_password:
    file: ./deploy/prod/secrets/postgres_password.txt
  admin_password:
    file: ./deploy/prod/secrets/admin_password.txt
  jwt_secret_key:
    file: ./deploy/prod/secrets/jwt_secret_key.txt
  openweather_api_key:
    file: ./deploy/prod/secrets/openweather_api_key.txt
