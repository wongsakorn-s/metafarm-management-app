services:
  db:
    image: postgres:15-alpine
    container_name: metafarm_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - metafarm_network

  backend:
    build: ./backend
    container_name: metafarm_backend
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://metafarm_user:change_me@db:5432/metafarm_db}
    volumes:
      - ./backend/static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/ready')"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metafarm_network

  frontend:
    build: ./frontend
    container_name: metafarm_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - metafarm_network

volumes:
  postgres_data:

networks:
  metafarm_network:
    driver: bridge
